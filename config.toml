[runtime]
# How many seconds before lock_at to sample kline data. The strategy
# REQUIRES the kline closing at lock - kline_cutoff_seconds (cutoff=2
# is the canonical baseline; without that kline the strategy falls
# apart). Runtime tolerance for OKX publish-delay tails is via the
# max_consecutive_kline_fetch_failures streak counter (the bot fetches
# at the latest possible moment the wake schedule allows; the
# streak counter absorbs occasional publish-delay misses).
kline_cutoff_seconds = 2

# Pool aggregate horizon: only on-chain bets with block_ts < lock_at -
# pool_cutoff_seconds are counted into the cutoff-pool used by the
# strategy. The RPC poll schedule (ramp_1, ramp_2, final) is derived
# from this. Canonical value: 6.
pool_cutoff_seconds = 6

# Streak counter on the live decision path. After this many consecutive
# OKX kline fetch failures the gate raises InvariantError, the bot
# crashes, and the supervisor restarts + fires a Discord alert.
max_consecutive_kline_fetch_failures = 5

[dry]
# Starting bankroll for fresh dry runs (ignored when continuing from existing state)
initial_bankroll_bnb = 5.0

[live]
# Override all computed bet sizes to the contract minimum.
# All strategy logic still runs normally -- signal, sizing, filters -- but the
# actual submitted amount is clamped to minBetAmount for safe testing.
# (Default: true. Set to false only after full-size live validation is complete.)
min_bet_only = true

[backtest]
# Number of most recent rounds to replay. Also controls how many rounds --sync fetches.
backtest_round_count = 35000
initial_bankroll_bnb = 50.0
# Optional epoch slicing. Both default to None (whole window). Uncomment
# to bound the backtest to a specific epoch range.
# epoch_start = 1234567   # inclusive lower bound
# epoch_end = 7654321     # inclusive upper bound

# ================================================================
# Strategy configuration
#
# IMPORTANT: All pool-related settings refer to the CUTOFF POOL
# (the partial pool observed at lock_at - pool_cutoff_seconds,
# ~6s before lock), NOT the final pool at settlement. The live bot
# only observes pool growth up to this cutoff to maintain
# deterministic decision-making.
# ================================================================

[strategy.pool_filter]
min_pool_bnb_at_cutoff = 1.5
min_payout_multiple_at_cutoff = 1.5

[strategy.gate]
# Multi-TF momentum gate: all lookbacks must agree in direction and
# min(|return|) must exceed mtf_min_return_threshold for the gate to fire.
# Previously module constants in momentum_gate.py.
mtf_lookbacks = [3, 7, 15]
mtf_min_return_threshold = 0.0001

[strategy.btc_primary.threshold]
# Small-pool admission: signal_strength must exceed small_pool_min_signal_strength when the
# pool is below pool_size_boundary_bnb (large pools rely on the gate's
# mtf_min_return_threshold). Removed key 'large_pool' was equal to mtf_min_return_threshold by
# construction (dead-by-equality).
small_pool_min_signal_strength = 0.0002
pool_size_boundary_bnb = 3.0

[strategy.btc_primary.sizing]
# base_pool_fraction: starting pool fraction for the bet.
# pool_fraction_slope: gain on signal_strength (frac = base + slope * strength).
# max_pool_fraction: hard cap on the resulting fraction.
# pool_fraction_slope and max_pool_fraction were previously module constants in momentum_pipeline.py.
base_pool_fraction = 0.04
pool_fraction_slope = 100.0
max_pool_fraction = 0.30

[strategy.eth_sol_fallback.signal]
min_signal_strength = 0.00015

[strategy.eth_sol_fallback.sizing]
base_pool_fraction = 0.02

[strategy.tier2_sizing]
# Symmetric weight applied to BOTH ETH and SOL signal strengths in the
# BTC-primary confirmation boost AND the regime-2 effective-strength
# composition. Collapsed from former separate eth_sizing_weight /
# sol_sizing_weight (always identical in practice).
# Removed knob: payout_slope (hardcoded slope=1.0 in code now).
eth_sol_signal_weight = 0.3

# Lower bound applied at the end of _compute_bet_size:
# max(min_bet_threshold_bnb, min(cap_bnb, bet)). Distinct from the
# on-chain min_bet_amount_bnb (~0.001) which is checked at the call
# site. Bit-identical at default 0.01 because every observed bet on
# the canonical baseline already exceeds this floor (Phase 2 ablation
# 2026-04-23). Renamed from former 'floor_bnb' for clarity.
min_bet_threshold_bnb = 0.01

[strategy.risk]
# Risk controls active when a BankrollTracker is wired in (backtest always,
# dry/live when runtime constructs a PersistedBankrollTracker). All checks
# are no-ops when tracker is None. Defaults tuned to protect against
# worst-case deposit timing (peak-window sweep showed risk-OFF zeros the
# bankroll in a ~5k-round post-peak drawdown regime). These defaults ARE
# binding on the full backtest -- accepted PnL reduction buys insurance
# against catastrophic drawdown for small initial bankrolls.
max_bet_fraction_of_bankroll = 0.05        # bet <= 5% of current bankroll
min_bankroll_bnb_to_bet = 0.20                # pause all bets while bankroll < this
max_drawdown_fraction_from_peak = 0.15     # 1.0 = disabled; fires in normal regimes
cooldown_rounds = 72                   # 6 hours at 5-min rounds
drawdown_peak_window_days = 7                        # rolling window for peak calculation
drawdown_peak_mode = "rolling_7d"      # peak-tracking semantics; alt: "absolute_ratchet" (monotonic since-launch peak)
# Absolute per-bet BNB caps (formerly under btc_primary.sizing / eth_sol_fallback.sizing).
max_bet_bnb_btc_primary = 2.0          # hard cap on BTC primary stake
max_bet_bnb_eth_sol_fallback = 0.5     # hard cap on ETH+SOL regime-2 stake
