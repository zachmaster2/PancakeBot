[strategy.router]
# Shared router mode for live/dry/backtest:
# selector_max_score | skip_only | oracle_skip | online_cellmean | online_cellmean_side_gap | online_cellmean_backoff | online_cellmean_selector_fallback | online_cellmean_selector_gate | online_selector_score_fallback | online_selector_score_gate | online_selector_score_side_gap | online_selector_score_late_imb_fallback | online_selector_score_late_imb_gate | online_selector_score_side_late_fallback | online_selector_score_side_late_gate | online_selector_score_side_support_fallback | online_selector_score_side_support_gate
mode = "online_selector_score_fallback"

# Extra score gate for selector_max_score mode.
score_threshold_bnb = -1000000000.0

# Online cell-mean warmup and celling parameters.
online_warmup_rounds = 50000
online_num_quantile_bins = 12
online_min_cell_obs = 5
online_score_threshold_bnb = 0.008
online_use_direction_split = false

[strategy.ml_candidate]
# Locked ML walk-forward preset.
# This is the single production ML knob set used by shared pipeline modes.
enabled = false
name = "mlwf_bestset_adapt_v1"
fixed_bet_bnb = 0.2
min_tradeable_prob = 0.51
min_prob_edge = 0.0015
cutoff_pool_total_min_bnb = 1.2
expected_net_min_bnb = 0.0
# Optional EV ceiling for the ML candidate; omit to disable.
# expected_net_max_bnb = 0.005
train_size = 10000
calibrate_size = 5000
retrain_interval = 5000
recalibrate_interval = 2500
price_alpha = 0.9
pool_alpha_total = 0.8
pool_alpha_ratio = 0.7
recency_weight_floor = 1.0
recency_weight_power = 2.0
predictability_baseline_bet_bnb = 0.02
predictability_feature_mode = "all_features"
predictability_label_mode = "baseline_log_imbalance_side"
emit_candidate = true
veto_opposite_side_candidates = false
veto_untradeable_candidates = false
veto_candidate_expected_net_below_min = false
rescore_baseline_candidates_with_expected_net = false
random_seed = 1337

[backtest]
# Number of most-recent closed rounds to replay.
simulation_size = 20000

# Starting bankroll for backtest replay.
initial_bankroll_bnb = 50.0

# Backtest reset mode: continuous | chunk_reset
reset_mode = "continuous"

# Reset interval in rounds when reset_mode="chunk_reset".
reset_every_rounds = 0
