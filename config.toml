# PancakeBot configuration
#
# This file defines the single production pipeline used by live, dry, and
# backtest modes.
#
# No backward compatibility is supported: unknown keys are treated as errors.

[paths]
# Path to closed-round history JSONL (epoch-ascending).
closed_rounds_path = "var/closed_rounds.jsonl"

# Path to minute kline history JSONL.
klines_path = "var/klines.jsonl"

# Path to persisted feature-vector cache used by backtest/inspection ML runs.
feature_cache_path = "../PancakeBot_var_exp/feature_cache_v8.sqlite"

# Path to persisted backtest warmup snapshot cache (outside repo tree).
backtest_state_cache_dir = "../PancakeBot_var_exp/backtest_state_cache"

# Path to SQLite mirror for canonical rounds/bets/klines used by backtests.
market_data_db_path = "../PancakeBot_var_exp/market_data_v1.sqlite"

# Path to SQLite cache for ML final-pool projections.
projection_cache_db_path = "../PancakeBot_var_exp/projection_cache_v1.sqlite"

# Path to SQLite run registry for experiment bookkeeping.
run_registry_db_path = "../PancakeBot_var_exp/run_registry_v1.sqlite"

# Mutable runtime state paths for live/dry loops.
claim_scan_cursor_path = "var/runtime/claim_scan_cursor.txt"
dry_bets_path = "var/runtime/dry_bets.jsonl"
dry_settled_epochs_path = "var/runtime/dry_settled_epochs.txt"
dry_audit_trades_path = "var/runtime/dry_audit_trades.csv"
dry_bankroll_state_path = "var/runtime/dry_bankroll_state.json"
dry_pipeline_bootstrap_state_path = "var/runtime/dry_pipeline_bootstrap_state.pkl.gz"
live_pipeline_bootstrap_state_path = "var/runtime/live_pipeline_bootstrap_state.pkl.gz"

[graph]
# ABI filepath (must contain ABI array JSON).
abi_json_path = "abi/prediction_v2_abi.json"

[runtime]
# Seconds before round lock for cutoff-time snapshotting.
cutoff_seconds = 17

# Deterministic seed used for all reproducible operations.
random_seed = 1337

# If true, replace Graph target-round bets with on-chain bet events.
use_onchain_event_bets = false

# Block lookback for event reconstruction when use_onchain_event_bets=true.
event_lookback_blocks = 600

# Path for live latency telemetry JSONL.
latency_log_path = "var/live_latency.jsonl"

# Optional starting bankroll for dry-mode smoke tests when no meaningful
# persisted dry state exists yet. Keeps restarts deterministic after cleanup.
dry_initial_bankroll_bnb = 50.0

# If true, wait for bet receipt confirmation in live mode.
wait_for_bet_receipt = true

# Receipt timeout in seconds when wait_for_bet_receipt=true.
bet_receipt_timeout_seconds = 45

[strategy]
# Single production strategy namespace.

[strategy.dislocation]
# Optional allowlist. When set, only these named candidates are active.
# Candidate definitions remain below for experiment traceability.
# Official baseline:
#   online-selector leader promoted on 2026-03-15 at 1 gwei accounting.
active_candidate_names = [
  "disloc_altA_20260227_x80",
  "disloc_altB_20260227_x80",
]

[strategy.dislocation.selector]
# Settled rounds required before selector can choose a candidate.
warmup_rounds = 50000

# Quantile bins for selector celling on EV and absolute dislocation.
num_quantile_bins = 12

# Minimum observations required for a selector cell.
min_cell_obs = 5

# Minimum selector cell mean-profit score (BNB) to allow picks.
score_threshold = -0.01

# If true, selector cells are split by side (bull/bear).
use_direction_split = true

# Initial per-candidate shadow bankroll used by selector internals.
shadow_initial_bankroll_bnb = 0.5

# Candidate table schema
# Required keys per candidate:
#   name
#   lookback1_seconds
#   lookback2_seconds
#   lookback3_seconds
#   weight1
#   weight2
#   weight3
#   temperature_bps
#   fixed_bet_bnb
#   dislocation_threshold_pp
#   nowcast_confidence_min
#   cutoff_pool_total_min_bnb
#   pool_total_gate_mode (optional: "cutoff_only" | "projected_final_only" | "projected_final_model_only")
#   projected_final_pool_multiplier (optional; used when pool_total_gate_mode="projected_final_only")
#   projected_final_pool_total_min_bnb (optional; used when pool_total_gate_mode is projected)
#   expected_net_min_bnb
#   bull_expected_net_extra_min_bnb (optional)
#   bear_expected_net_extra_min_bnb (optional)
#   bull_late_min_ratio (optional)
#   bull_late_min_imbalance (optional)
#   bear_late_min_ratio (optional)
#   bear_late_max_imbalance (optional)
#   late_support_ev_scale_bnb (optional)
#   side_selection_mode
#   market_extreme_min
#   nowcast_market_gap_min (optional)
#   flow_window_seconds
#   flow_min_imbalance
#   flow_gate_mode
#   adaptive_candidate_modes
#   adaptive_window
#   adaptive_min_history
#   adaptive_score
#   adaptive_fallback_mode
#   stake_mode ("fixed" | "ev_scaled" | "ev_optimal" | "ev_scaled_projected" | "ev_optimal_projected")
#   stake_min_bnb
#   stake_max_bnb
#   stake_ev_ref_bnb
#   stake_max_side_pool_frac
#   perf_adapt_mode
#   perf_gate_window
#   perf_gate_min_history
#   perf_gate_min_win_rate
#   perf_gate_min_mean_profit_bnb
#   robust_ev_veto_enabled (optional)
#   robust_ev_veto_min_history (optional)
#   robust_ev_veto_window (optional)
#   robust_ev_veto_low_inflow_mult (optional)
#   robust_ev_veto_extreme_inflow_mult (optional)
#   robust_ev_veto_adverse_skew (optional)
#   robust_ev_veto_min_expected_net_bnb (optional)
#   shock_filter_enabled (optional)
#   shock_filter_window_seconds (optional)
#   shock_filter_min_window_total_bnb (optional)
#   shock_filter_min_abs_imbalance (optional)
#   shock_filter_min_surge_ratio (optional)
#   late_model_conflict_flip_enabled (optional)
#   late_model_veto_enabled (optional)
#   late_model_veto_min_late_ratio (optional)
#   late_model_veto_min_abs_imbalance (optional)

