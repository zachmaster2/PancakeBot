[runtime]
# How many seconds before lock_at to sample kline data
kline_cutoff_seconds = 2
# How many seconds before kline cutoff to wake for housekeeping (epoch check, TLS warmup)
prefetch_offset_seconds = 4

[dry]
# Starting bankroll for fresh dry runs (ignored when continuing from existing state)
initial_bankroll_bnb = 5.0

[live]
# Override all computed bet sizes to the contract minimum.
# All strategy logic still runs normally -- signal, sizing, filters -- but the
# actual submitted amount is clamped to minBetAmount for safe testing.
min_bet_only = true

[backtest]
# Number of most recent rounds to replay. Also controls how many rounds --sync fetches.
simulation_size = 35000
initial_bankroll_bnb = 50.0

# ================================================================
# Strategy configuration
#
# IMPORTANT: All pool-related settings refer to the CUTOFF POOL
# (the partial pool observed at lock_at - POOL_CUTOFF_SECONDS,
# ~6s before lock), NOT the final pool at settlement. The live bot
# only observes pool growth up to this cutoff to maintain
# deterministic decision-making.
# ================================================================

[strategy.pool_filter]
min_pool_bnb = 1.5
min_payout = 1.5

[strategy.btc_primary.threshold]
small_pool = 0.0002
large_pool = 0.0001
pool_size_boundary_bnb = 3.0

[strategy.btc_primary.sizing]
base_fraction = 0.04

[strategy.eth_sol_fallback.signal]
min_strength = 0.00015

[strategy.eth_sol_fallback.sizing]
base_fraction = 0.02

[strategy.strong_bypass]
# Strong-bypass admission: when BTC signal strength is unusually high, bypass
# the standard strategy.pool_filter.min_pool_bnb gate so we can still bet on
# small-pool rounds. A dedicated (smaller) sizing + BNB cap limits dilution.

[strategy.strong_bypass.threshold]
min_strength = 0.0004     # BTC min(|r3|,|r7|,|r15|) required for bypass
min_pool_bnb = 1.0        # absolute pool floor (bypasses pool_filter.min_pool_bnb above this)

[strategy.strong_bypass.sizing]
base_fraction = 0.03      # conservative base fraction (smaller than btc_primary.sizing.base_fraction)
max_bet_bnb = 0.3         # absolute per-bet BNB cap for bypass bets

[strategy.risk]
# Risk controls active when a BankrollTracker is wired in (backtest always,
# dry/live when runtime constructs a PersistedBankrollTracker). All checks
# are no-ops when tracker is None. Defaults tuned to protect against
# worst-case deposit timing (peak-window sweep showed risk-OFF zeros the
# bankroll in a ~5k-round post-peak drawdown regime). These defaults ARE
# binding on the full backtest -- accepted PnL reduction buys insurance
# against catastrophic drawdown for small initial bankrolls.
max_bet_frac_of_bankroll = 0.05        # bet <= 5% of current bankroll
min_bankroll_bnb = 0.20                # pause all bets while bankroll < this
max_drawdown_frac_from_peak = 0.15     # 1.0 = disabled; fires in normal regimes
cooldown_rounds = 72                   # 6 hours at 5-min rounds
window_days = 7                        # rolling window for peak calculation
# Absolute per-bet BNB caps (formerly under btc_primary.sizing / eth_sol_fallback.sizing).
max_bet_bnb_btc_primary = 2.0          # hard cap on BTC primary stake
max_bet_bnb_eth_sol_fallback = 0.5     # hard cap on ETH+SOL regime-2 stake
